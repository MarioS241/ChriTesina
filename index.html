<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesina Robotica - Christian Caruso</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

        :root {
            --neon: #38bdf8;
            --neon2: #0ea5e9;
            --glow: rgba(56,189,248,0.5);
            --dark: #0f172a;
            --darker: #060d1a;
            --mid: #1e293b;
            --green: #4ade80;
            --orange: #fb923c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            overflow: hidden;
            background: var(--darker);
            font-family: 'Exo 2', sans-serif;
            height: 100%; width: 100%;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        body::after {
            content: '';
            position: fixed; top: -100%; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(transparent, var(--neon), transparent);
            opacity: 0.3;
            animation: scanLine 6s linear infinite;
            pointer-events: none; z-index: 100;
        }
        @keyframes scanLine {
            0% { top: -1%; }
            100% { top: 101%; }
        }

        #start-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 24px;
            z-index: 10;
            transition: opacity 1.8s ease, transform 1.8s ease;
            background: radial-gradient(ellipse at center, #1e293b 0%, var(--darker) 70%);
        }

        .subtitle {
            color: #64748b;
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            animation: fadeInUp 1s ease 0.3s both;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            color: var(--neon);
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56,189,248,0.2);
            animation: fadeInUp 1s ease 0.6s both, neonFlicker 4s ease 1.6s infinite;
        }

        @keyframes neonFlicker {
            0%,100% { text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56,189,248,0.2); }
            92% { text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56,189,248,0.2); }
            93% { text-shadow: none; }
            94% { text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56,189,248,0.2); }
            96% { text-shadow: none; }
            97% { text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56,189,248,0.2); }
        }

        .divider {
            width: 200px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            animation: fadeInUp 1s ease 0.9s both;
        }

        .tagline {
            color: #94a3b8;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUp 1s ease 1.1s both;
        }

        #btn-start {
            margin-top: 16px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 14px 50px;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.3s, box-shadow 0.3s;
            animation: fadeInUp 1s ease 1.4s both;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
        }
        #btn-start::before {
            content: '';
            position: absolute; inset: 0;
            background: var(--neon);
            transform: translateX(-105%);
            transition: transform 0.3s ease;
            z-index: -1;
        }
        #btn-start:hover::before { transform: translateX(0); }
        #btn-start:hover {
            color: var(--darker);
            box-shadow: 0 0 30px var(--glow);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(1.3) !important;
            pointer-events: none;
        }

        #container-3d {
            position: fixed; inset: 0;
            z-index: 1;
        }

        .corner {
            position: fixed;
            width: 40px; height: 40px;
            opacity: 0;
            transition: opacity 1s ease 2s;
            z-index: 6;
        }
        .corner.show { opacity: 1; }
        .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
        .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--neon); border-right: 2px solid var(--neon); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--neon); border-left: 2px solid var(--neon); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--neon); border-right: 2px solid var(--neon); }

        #hud-left {
            position: fixed; left: 30px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px;
            opacity: 0; transition: opacity 1s ease 2.5s;
            z-index: 6;
        }
        #hud-left.show { opacity: 1; }

        .hud-line {
            display: flex; align-items: center; gap: 10px;
            color: #475569; font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase;
        }
        .hud-line::before {
            content: '';
            width: 20px; height: 1px;
            background: var(--neon); opacity: 0.5;
        }
        .hud-bar {
            width: 3px; height: 80px;
            background: linear-gradient(to bottom, var(--neon), transparent);
            opacity: 0.3;
        }

        #final-text {
            position: fixed; bottom: 8%; width: 100%;
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon);
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 10px;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 5;
            text-shadow: 0 0 20px var(--glow);
            pointer-events: none;
        }
        #final-text.show { opacity: 1; }

        #caption {
            position: fixed; bottom: 4%; width: 100%;
            text-align: center;
            font-family: 'Exo 2', sans-serif;
            color: #64748b;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease 1s;
            z-index: 5;
            pointer-events: none;
        }
        #caption.show { opacity: 1; }

        #phase-indicator {
            position: fixed; top: 30px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            color: #334155;
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 6;
        }
        #phase-indicator.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="start-screen">
        <p class="subtitle">Christian Caruso Production presenta</p>
        <h1>LA ROBOTICA</h1>
        <div class="divider"></div>
        <p class="tagline">Protesi &amp; Tecnologia &mdash; Tesina di Fine Anno</p>
        <button id="btn-start" onclick="iniziaPresentazione()">PRESENTA</button>
    </div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div id="hud-left">
        <div class="hud-bar"></div>
        <div class="hud-line">Robotica</div>
        <div class="hud-line">Protesi</div>
        <div class="hud-line">Ed. Fisica</div>
        <div class="hud-bar"></div>
    </div>

    <div id="phase-indicator">// INIZIALIZZAZIONE SISTEMA</div>
    <div id="final-text">EDUCAZIONE FISICA</div>
    <div id="caption">Robotica applicata alla vita &mdash; protesi bioniche per bambini</div>
    <div id="container-3d"></div>

    <script>
    let scene, camera, renderer, animId;
    let phase = 0;
    let motherboardGroup, armGroup, bodyGroup;
    let clock;

    // Animazione protesi: riferimenti ai gruppi articolati
    let prosArmGroup = null;   // tutto il braccio prostetico standalone (fase 1)
    let bodyProsGroup = null;  // protesi sul corpo (fase 2)
    let prosAnimPhase = 0;     // 0=idle, 1=abbassa, 2=ruota polso, 3=chiudi/apri
    let prosAnimStart = 0;
    let fingerMeshes = [];     // dita della protesi body (per animazione chiusura)
    let bodyProsElbow = null;  // gomito/avambraccio per rotazione

    function iniziaPresentazione() {
        document.getElementById('start-screen').classList.add('fade-out');
        setTimeout(() => {
            document.querySelectorAll('.corner').forEach(c => c.classList.add('show'));
            document.getElementById('hud-left').classList.add('show');
            document.getElementById('phase-indicator').classList.add('show');
            init3D();
        }, 1200);
    }

    function init3D() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x060d1a, 0.06);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container-3d').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x0f2040, 2));

        const dirLight = new THREE.DirectionalLight(0x38bdf8, 3);
        dirLight.position.set(2, 4, 3);
        scene.add(dirLight);

        const rimLight = new THREE.DirectionalLight(0x4ade80, 1);
        rimLight.position.set(-3, -1, -2);
        scene.add(rimLight);

        const pointLight = new THREE.PointLight(0x38bdf8, 5, 20);
        pointLight.position.set(0, 0, 3);
        scene.add(pointLight);

        motherboardGroup = createMotherboard();
        scene.add(motherboardGroup);

        armGroup = createProsteticArmStandalone();
        armGroup.visible = false;
        scene.add(armGroup);

        bodyGroup = createChildBody();
        bodyGroup.visible = false;
        scene.add(bodyGroup);

        createParticles();
        animate();
        schedulePhases();
    }

    // ─────────────────────────────────────────
    // SCHEDA MADRE MIGLIORATA
    // ─────────────────────────────────────────
    function createMotherboard() {
        const group = new THREE.Group();
        const neon = 0x38bdf8;
        const green = 0x4ade80;
        const orange = 0xfb923c;
        const yellow = 0xfbbf24;

        // PCB base più dettagliato
        const pcbGeo = new THREE.BoxGeometry(3.8, 2.8, 0.1);
        const pcbMat = new THREE.MeshPhongMaterial({ color: 0x0d2a18, shininess: 100, specular: 0x1a4a2a });
        const pcb = new THREE.Mesh(pcbGeo, pcbMat);
        group.add(pcb);

        // Bordo PCB con colore diverso (strato esterno)
        const borderGeo = new THREE.BoxGeometry(3.8, 2.8, 0.08);
        const borderEdge = new THREE.EdgesGeometry(borderGeo);
        const borderMat = new THREE.LineBasicMaterial({ color: 0x1a5c30 });
        group.add(new THREE.LineSegments(borderEdge, borderMat));

        // Circuiti tracciati (più densi e articolati)
        const traceMat = new THREE.LineBasicMaterial({ color: neon, linewidth: 1 });
        const traceMatG = new THREE.LineBasicMaterial({ color: green, linewidth: 1 });
        const traceMatO = new THREE.LineBasicMaterial({ color: orange, linewidth: 1 });

        const traces = [
            { pts: [[-1.7,1.2,0.06],[-1.7,0.4,0.06],[-0.9,0.4,0.06],[-0.9,0.1,0.06]], mat: traceMat },
            { pts: [[1.7,1.2,0.06],[1.7,-0.2,0.06],[0.5,-0.2,0.06],[0.5,-1.1,0.06]], mat: traceMat },
            { pts: [[-0.9,1.2,0.06],[-0.9,0.7,0.06],[0.9,0.7,0.06],[0.9,-0.5,0.06]], mat: traceMatG },
            { pts: [[0,-1.2,0.06],[0,-0.5,0.06],[-1.2,-0.5,0.06],[-1.2,0.1,0.06]], mat: traceMatO },
            { pts: [[0.5,1.2,0.06],[0.5,0.9,0.06],[1.3,0.9,0.06]], mat: traceMatG },
            { pts: [[-1.5,-0.2,0.06],[-0.5,-0.2,0.06],[-0.5,-1.1,0.06]], mat: traceMat },
            { pts: [[1.2,-0.3,0.06],[1.2,-1.1,0.06],[0.3,-1.1,0.06]], mat: traceMatG },
            { pts: [[-1.0,0.1,0.06],[-1.0,-0.8,0.06]], mat: traceMatO },
            { pts: [[0.2,0.5,0.06],[0.2,-0.2,0.06],[0.8,-0.2,0.06],[0.8,-0.8,0.06]], mat: traceMat },
        ];
        traces.forEach(({ pts, mat }) => {
            const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p => new THREE.Vector3(...p)));
            group.add(new THREE.Line(geo, mat));
        });

        // Via holes (piccoli cerchi sul PCB)
        const viaMat = new THREE.MeshPhongMaterial({ color: 0xd4a017, shininess: 300 });
        const viaPositions = [
            [-1.3,0.4],[-1.3,-0.5],[0.9,0.1],[0.9,-0.8],
            [-0.5,0.9],[0.5,-0.5],[-0.9,-0.8],[1.2,0.5]
        ];
        viaPositions.forEach(([x,y]) => {
            const vGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.12, 8);
            const v = new THREE.Mesh(vGeo, viaMat);
            v.position.set(x, y, 0);
            v.rotation.x = Math.PI/2;
            group.add(v);
        });

        // Chip principale (CPU) - più dettagliato
        const cpuBase = new THREE.BoxGeometry(0.75, 0.75, 0.14);
        const cpuMat = new THREE.MeshPhongMaterial({ color: 0x111827, shininess: 200, specular: 0x38bdf8 });
        const cpu = new THREE.Mesh(cpuBase, cpuMat);
        cpu.position.set(0, 0.2, 0.12);
        group.add(cpu);

        // Logo CPU
        const cpuEdge = new THREE.EdgesGeometry(cpuBase);
        group.add(new THREE.LineSegments(cpuEdge, new THREE.LineBasicMaterial({ color: neon })).translateY(0.2).translateZ(0.12));

        // Grigliato chip
        const gridMat = new THREE.LineBasicMaterial({ color: neon });
        for (let i = -3; i <= 3; i++) {
            const hGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-0.32, i * 0.1 + 0.2, 0.19),
                new THREE.Vector3(0.32, i * 0.1 + 0.2, 0.19)
            ]);
            group.add(new THREE.Line(hGeo, gridMat));
            const vGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(i * 0.1, -0.15, 0.19),
                new THREE.Vector3(i * 0.1, 0.55, 0.19)
            ]);
            group.add(new THREE.Line(vGeo, gridMat));
        }

        // Chip CPU pin connectors (pin laterali)
        const pinMat = new THREE.MeshPhongMaterial({ color: 0xd4a017, shininess: 300 });
        for (let i = 0; i < 6; i++) {
            const pinGeo = new THREE.BoxGeometry(0.04, 0.04, 0.05);
            [-0.42, 0.42].forEach(x => {
                const pin = new THREE.Mesh(pinGeo, pinMat);
                pin.position.set(x, -0.08 + i * 0.1 + 0.2, 0.12);
                group.add(pin);
            });
            [-0.42, 0.42].forEach(y => {
                const pin = new THREE.Mesh(pinGeo, pinMat);
                pin.position.set(-0.08 + i * 0.1, y - 0.17, 0.12);
                group.add(pin);
            });
        }

        // Condensatori (electrolytic)
        [[- 1.3, 0.9,orange],[- 1.3, 0.6,orange],[- 1.3, 0.3,yellow],[1.4, 0.8,orange],[1.4, 0.5,yellow],[1.4, 0.2,orange]].forEach(([x, y, col]) => {
            const capGeo = new THREE.CylinderGeometry(0.065, 0.065, 0.28, 10);
            const capMat = new THREE.MeshPhongMaterial({ color: col, shininess: 60 });
            const cap = new THREE.Mesh(capGeo, capMat);
            cap.position.set(x, y, 0.18);
            group.add(cap);
            // Striscia superiore condensatore
            const topGeo = new THREE.CylinderGeometry(0.065, 0.065, 0.01, 10);
            const topMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(x, y + 0.15, 0.18);
            group.add(top);
        });

        // Slot RAM (più realistici)
        [[-0.4, -0.75], [0.1, -0.75], [0.6, -0.75]].forEach(([x, y]) => {
            const slotBase = new THREE.BoxGeometry(0.1, 0.6, 0.18);
            const slotMat = new THREE.MeshPhongMaterial({ color: 0x1e2a3f });
            const slot = new THREE.Mesh(slotBase, slotMat);
            slot.position.set(x, y, 0.12);
            group.add(slot);
            // Clip laterali RAM (bianche)
            [-0.29, 0.29].forEach(dy => {
                const clipGeo = new THREE.BoxGeometry(0.1, 0.06, 0.22);
                const clip = new THREE.Mesh(clipGeo, new THREE.MeshPhongMaterial({ color: 0xcccccc }));
                clip.position.set(x, y + dy, 0.12);
                group.add(clip);
            });
            // RAM inserita (grigia con oro)
            const ramGeo = new THREE.BoxGeometry(0.08, 0.45, 0.08);
            const ramMat = new THREE.MeshPhongMaterial({ color: 0x2d3748, shininess: 100 });
            const ram = new THREE.Mesh(ramGeo, ramMat);
            ram.position.set(x, y, 0.18);
            group.add(ram);
        });

        // Slot PCIe / connettori bianchi
        [[-0.3, -1.1], [0.7, -1.1]].forEach(([x, y]) => {
            const connGeo = new THREE.BoxGeometry(0.8, 0.08, 0.16);
            const connMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 });
            const conn = new THREE.Mesh(connGeo, connMat);
            conn.position.set(x, y, 0.1);
            group.add(conn);
        });

        // Chipset secondario (piccolo)
        [[- 1.0, -0.2], [1.1, -0.6]].forEach(([x, y]) => {
            const cGeo = new THREE.BoxGeometry(0.35, 0.35, 0.1);
            const cMat = new THREE.MeshPhongMaterial({ color: 0x1a1a2e, shininess: 150, specular: 0x38bdf8 });
            const c = new THREE.Mesh(cGeo, cMat);
            c.position.set(x, y, 0.1);
            group.add(c);
            group.add(new THREE.LineSegments(new THREE.EdgesGeometry(cGeo), new THREE.LineBasicMaterial({ color: neon })).translateX(x).translateY(y).translateZ(0.1));
        });

        // Heatsink / dissipatore (griglie metalliche)
        const heatMat = new THREE.MeshPhongMaterial({ color: 0x94a3b8, shininess: 200 });
        for (let i = -3; i <= 3; i++) {
            const finGeo = new THREE.BoxGeometry(0.04, 0.6, 0.25);
            const fin = new THREE.Mesh(finGeo, heatMat);
            fin.position.set(-1.65 + i * 0.005, 0.6, 0.22 + Math.abs(i) * 0.02);
            group.add(fin);
        }
        // Base dissipatore
        const heatBase = new THREE.BoxGeometry(0.42, 0.62, 0.08);
        const hb = new THREE.Mesh(heatBase, heatMat);
        hb.position.set(-1.65, 0.6, 0.14);
        group.add(hb);

        // LED lampeggianti (angoli + aggiuntivi)
        const ledDefs = [
            { pos: [-1.6, -1.05, 0.1], color: green, offset: 0 },
            { pos: [ 1.5, -1.05, 0.1], color: green, offset: 0.7 },
            { pos: [-1.6,  1.1,  0.1], color: neon,  offset: 1.3 },
            { pos: [ 1.5,  1.1,  0.1], color: neon,  offset: 1.9 },
            { pos: [ 0.0,  1.1,  0.1], color: orange, offset: 0.4 },
            { pos: [-0.8, -1.05, 0.1], color: yellow, offset: 1.1 },
        ];
        ledDefs.forEach(({ pos, color, offset }) => {
            const ledGeo = new THREE.SphereGeometry(0.045, 8, 8);
            const ledMat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 2.5 });
            const led = new THREE.Mesh(ledGeo, ledMat);
            led.position.set(...pos);
            led.userData = { isLed: true, offset };
            group.add(led);
        });

        // Bordo wireframe neon
        const edgeGeo = new THREE.EdgesGeometry(pcbGeo);
        const edgeMat = new THREE.LineBasicMaterial({ color: neon, linewidth: 2 });
        group.add(new THREE.LineSegments(edgeGeo, edgeMat));

        // Fori viti angoli
        const screwMat = new THREE.MeshPhongMaterial({ color: 0x94a3b8, shininess: 300 });
        [[-1.7,-1.2],[1.7,-1.2],[-1.7,1.2],[1.7,1.2]].forEach(([x,y]) => {
            const sg = new THREE.CylinderGeometry(0.05, 0.05, 0.12, 8);
            const s = new THREE.Mesh(sg, screwMat);
            s.position.set(x, y, 0.05);
            group.add(s);
        });

        return group;
    }

    // ─────────────────────────────────────────
    // BRACCIO PROSTETICO STANDALONE (Fase 1)
    // con animazione | → \ → ruota polso → apri/chiudi mano
    // ─────────────────────────────────────────
    function createProsteticArmStandalone() {
        const group = new THREE.Group();
        const neon = 0x38bdf8;
        const metal = new THREE.MeshPhongMaterial({ color: 0x1e3a5f, shininess: 200, specular: 0x38bdf8 });
        const accent = new THREE.MeshPhongMaterial({ color: neon, emissive: neon, emissiveIntensity: 0.3, shininess: 300 });
        const dark = new THREE.MeshPhongMaterial({ color: 0x0f1f2e, shininess: 60 });

        // Spalla (fissa sul group)
        const shoulderGeo = new THREE.SphereGeometry(0.38, 16, 16);
        const shoulder = new THREE.Mesh(shoulderGeo, metal);
        shoulder.position.set(0, 1.8, 0);
        group.add(shoulder);

        // === AVAMBRACCIO SUPERIORE (ruota per | → \) ===
        // Pivot dal centro spalla
        const upperPivot = new THREE.Group();
        upperPivot.position.set(0, 1.8, 0);
        group.add(upperPivot);

    function createEmbeddedProsthetic(metalMat, accentMat, neon) {
        const group = new THREE.Group();
        const dark = new THREE.MeshPhongMaterial({ color: 0x0f1f2e, shininess: 60 });

        // Avambraccio superiore (pivot)
        const upperPivot = new THREE.Group();
        upperPivot.position.set(0, 0, 0);
        group.add(upperPivot);

        const uGeo = new THREE.CylinderGeometry(0.20, 0.16, 0.80, 12);
        const uArm = new THREE.Mesh(uGeo, metalMat);
        uArm.position.set(0, -0.40, 0);
        upperPivot.add(uArm);

        // Circuiti
        const lm = new THREE.LineBasicMaterial({ color: neon });
        for (let i = 0; i < 3; i++) {
            const a = (i/3)*Math.PI*2;
            const sg = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(Math.cos(a)*0.21, -0.1, Math.sin(a)*0.21),
                new THREE.Vector3(Math.cos(a)*0.21, -0.75, Math.sin(a)*0.21)
            ]);
            upperPivot.add(new THREE.Line(sg, lm));
        }

        // Gomito
        const elbowGeo = new THREE.SphereGeometry(0.20, 12, 12);
        const elbow = new THREE.Mesh(elbowGeo, accentMat.clone());
        elbow.position.set(0, -0.82, 0);
        upperPivot.add(elbow);

        // Avambraccio inferiore (pivot per rotazione "guarda mano")
        const forePivot = new THREE.Group();
        forePivot.position.set(0, -0.82, 0);
        upperPivot.add(forePivot);

        const fGeo = new THREE.CylinderGeometry(0.15, 0.12, 0.75, 12);
        const fArm = new THREE.Mesh(fGeo, dark);
        fArm.position.set(0, -0.375, 0);
        forePivot.add(fArm);

        [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
            const pGeo = new THREE.BoxGeometry(0.055, 0.6, 0.08);
            const p = new THREE.Mesh(pGeo, accentMat.clone());
            p.position.set(Math.cos(a)*0.18, -0.375, Math.sin(a)*0.18);
            p.rotation.y = a;
            forePivot.add(p);
        });

        // Polso
        const wGeo = new THREE.CylinderGeometry(0.14, 0.12, 0.18, 12);
        const w = new THREE.Mesh(wGeo, accentMat.clone());
        w.position.set(0, -0.79, 0);
        forePivot.add(w);

        // Mano pivot
        const handPivot = new THREE.Group();
        handPivot.position.set(0, -0.90, 0);
        forePivot.add(handPivot);

        const palmGeo = new THREE.BoxGeometry(0.32, 0.14, 0.25);
        const palm = new THREE.Mesh(palmGeo, metalMat);
        palm.position.set(0, -0.07, 0);
        handPivot.add(palm);

        // Dita (con pivot per chiusura)
        const fingerData = [];
        [[-0.12,0],[-0.04,0],[0.04,0],[0.12,0]].forEach(([dx,dz]) => {
            const fp = new THREE.Group();
            fp.position.set(dx, -0.145, dz);
            handPivot.add(fp);

            for (let seg = 0; seg < 3; seg++) {
                const sp = new THREE.Group();
                sp.position.set(0, -seg*0.12, 0);
                fp.add(sp);

                const fgGeo = new THREE.BoxGeometry(0.055, 0.10, 0.055);
                const fMesh = new THREE.Mesh(fgGeo, seg%2===0 ? metalMat : accentMat.clone());
                fMesh.position.set(0, -0.05, 0);
                sp.add(fMesh);

                if (seg < 2) {
                    const jg = new THREE.SphereGeometry(0.032, 8, 8);
                    const jm = new THREE.Mesh(jg, accentMat.clone());
                    jm.position.set(0, -0.10, 0);
                    sp.add(jm);
                }

                fingerData.push({ pivot: sp });
            }
        });

        // Pollice
        const tp = new THREE.Group();
        tp.position.set(0.20, -0.115, 0.04);
        tp.rotation.z = Math.PI/4;
        handPivot.add(tp);
        const tg = new THREE.BoxGeometry(0.055, 0.09, 0.055);
        tp.add(new THREE.Mesh(tg, metalMat));

        return {
            group,
            upperPivot,
            forePivot,
            handPivot,
            fingerData,
            thumbPivot: tp
        };
    }

    // ─────────────────────────────────────────
    // SCHEDULE FASI
    // ─────────────────────────────────────────
    function schedulePhases() {
        setTimeout(() => {
            phase = 1;
            document.getElementById('phase-indicator').textContent = '// SISTEMA PROTESICO RILEVATO';
            motherboardGroup.visible = false;
            armGroup.visible = true;
            armGroup.scale.set(0.01, 0.01, 0.01);
            gsapLike(camera.position, { z: 8 }, 3000);
            gsapLike(armGroup.scale, { x: 1, y: 1, z: 1 }, 1500);

            // Avvia animazione protesi standalone dopo che appare (2s dopo)
            setTimeout(() => {
                prosAnimPhase = 1;
                prosAnimStart = clock.getElapsedTime();
            }, 2000);

        }, 4500);

        setTimeout(() => {
            phase = 2;
            document.getElementById('phase-indicator').textContent = '// INTEGRAZIONE COMPLETA';
            armGroup.visible = false;
            bodyGroup.visible = true;
            bodyGroup.scale.set(0.01, 0.01, 0.01);
            gsapLike(camera.position, { z: 14, y: 1 }, 4000);
            gsapLike(bodyGroup.scale, { x: 1, y: 1, z: 1 }, 2000);

            setTimeout(() => {
                document.getElementById('final-text').classList.add('show');
                document.getElementById('caption').classList.add('show');
                document.getElementById('phase-indicator').textContent = '// PRESENTAZIONE ATTIVA';
            }, 3000);
        }, 12000);
    }

    // ─────────────────────────────────────────
    // MINI TWEEN
    // ─────────────────────────────────────────
    function gsapLike(obj, targets, duration) {
        const start = {};
        for (const k in targets) start[k] = obj[k];
        const startTime = performance.now();
        function tick() {
            const t = Math.min((performance.now() - startTime) / duration, 1);
            const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            for (const k in targets) obj[k] = start[k] + (targets[k] - start[k]) * ease;
            if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    }

    function easeInOut(t) {
        return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // ─────────────────────────────────────────
    // ANIMAZIONE PROTESI STANDALONE
    // Sequenza: | → \ (3s) → ruota avambraccio/polso (3s) → apri/chiudi 2x (4s)
    // ─────────────────────────────────────────
    function animateProsthetic(t) {
        if (!armGroup.visible || !armGroup.userData.upperPivot) return;

        const elapsed = t - prosAnimStart;
        const up = armGroup.userData.upperPivot;
        const fp = armGroup.userData.forePivot;
        const hp = armGroup.userData.handPivot;
        const fingers = armGroup.userData.fingerData || [];
        const thumb = armGroup.userData.thumbPivot;

        // Fase 1: | → \ (abbassa il braccio da verticale a diagonale) 0-3s
        if (prosAnimPhase === 1) {
            const prog = Math.min(elapsed / 3.0, 1);
            const e = easeInOut(prog);
            // Parte da 0 (braccio verticale verso il basso) e ruota a ~60° laterale
            up.rotation.z = lerp(0, Math.PI * 0.38, e);
            if (prog >= 1) {
                prosAnimPhase = 2;
                prosAnimStart = t;
            }
        }
        // Fase 2: ruota avambraccio come per guardare la mano (0-3s)
        else if (prosAnimPhase === 2) {
            const prog = Math.min(elapsed / 3.0, 1);
            const e = easeInOut(prog);
            up.rotation.z = Math.PI * 0.38;
            // Ruota l'avambraccio verso l'alto (piega il gomito)
            fp.rotation.z = lerp(0, -Math.PI * 0.55, e);
            // Ruota il polso/mano per "guardare la mano"
            hp.rotation.x = lerp(0, -Math.PI * 0.4, e);
            if (prog >= 1) {
                prosAnimPhase = 3;
                prosAnimStart = t;
            }
        }
        // Fase 3: chiudi e apri mano 2 volte (0-5s)
        else if (prosAnimPhase === 3) {
            up.rotation.z = Math.PI * 0.38;
            fp.rotation.z = -Math.PI * 0.55;
            hp.rotation.x = -Math.PI * 0.4;

            const prog = Math.min(elapsed / 5.0, 1);
            // 2 cicli di chiusura/apertura
            const cycle = (prog * 2) % 1; // 0→1 per ogni mezzo periodo
            const openClose = Math.sin(cycle * Math.PI * 2); // -1..1
            const fingerAngle = Math.max(0, openClose) * Math.PI * 0.55;
            const thumbAngle = Math.max(0, openClose) * Math.PI * 0.35;

            fingers.forEach(({ pivot }, i) => {
                const seg = i % 3;
                // Le falangi distali piegano di più
                pivot.rotation.x = fingerAngle * (1 + seg * 0.3);
            });
            if (thumb) thumb.rotation.x = thumbAngle;

            if (prog >= 1) {
                prosAnimPhase = 4; // animazione finita, idle
            }
        }
        // Fase 4: idle (mantieni posizione)
        else if (prosAnimPhase === 4) {
            up.rotation.z = Math.PI * 0.38;
            fp.rotation.z = -Math.PI * 0.55;
            hp.rotation.x = -Math.PI * 0.4;
        }
    }

    // ─────────────────────────────────────────
    // LOOP DI ANIMAZIONE
    // ─────────────────────────────────────────
    function animate() {
        animId = requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        if (motherboardGroup.visible) {
            motherboardGroup.rotation.y = t * 0.5;
            motherboardGroup.rotation.x = Math.sin(t * 0.35) * 0.18;
            motherboardGroup.position.y = Math.sin(t * 0.7) * 0.08;

            motherboardGroup.children.forEach(c => {
                if (c.userData.isLed) {
                    c.material.emissiveIntensity = 1.5 + Math.sin(t * 3 + c.userData.offset) * 1.2;
                }
            });
        }

        if (armGroup.visible) {
            // Respiro leggero solo se non stiamo animando la posizione del braccio
            if (prosAnimPhase === 0) {
                armGroup.rotation.y = Math.sin(t * 0.5) * 0.3;
                armGroup.position.y = Math.sin(t * 0.9) * 0.12;
            } else {
                // Leggero respiro
                armGroup.position.y = Math.sin(t * 0.9) * 0.04;
                armGroup.rotation.y = Math.sin(t * 0.4) * 0.08;
            }
            animateProsthetic(t);
        }

        if (bodyGroup.visible) {
            bodyGroup.rotation.y = Math.sin(t * 0.3) * 0.12;
            bodyGroup.position.y = Math.sin(t * 0.6) * 0.04 - 1;

            // Anima protesi sul corpo (idle dondolio)
            const bp = bodyGroup.userData.bodyPros;
            if (bp) {
                const sway = Math.sin(t * 0.5) * 0.04;
                bp.upperPivot.rotation.z = sway;
            }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
</body>
</html>
