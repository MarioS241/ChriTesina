<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Robotica - Christian Caruso</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #intro {
            position: fixed; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: all 1.2s ease-in-out;
            background: radial-gradient(circle, #1e293b 0%, #000 100%);
        }
        .hide { opacity: 0; transform: translateY(-100%); pointer-events: none; }
        h1 { color: #fff; font-size: 3.5rem; letter-spacing: 10px; text-shadow: 0 0 20px #38bdf8; }
        button {
            background: transparent; border: 2px solid #38bdf8; color: #38bdf8;
            padding: 15px 50px; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #38bdf8; color: #000; box-shadow: 0 0 30px #38bdf8; }
        #ed-fisica {
            position: fixed; top: 10%; width: 100%; text-align: center;
            color: #38bdf8; font-size: 5rem; font-weight: 900; opacity: 0;
            transition: 2s ease; z-index: 50; letter-spacing: 10px;
        }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div id="intro">
        <h2 style="color:#38bdf8; opacity:0.6;">CHRISTIAN CARUSO PRODUCTION PRESENTA</h2>
        <h1>LA ROBOTICA</h1>
        <button onclick="trasformazione()">PRESENTA</button>
    </div>

    <div id="ed-fisica">ED. FISICA</div>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, armGroup, armSolid, armWire;

        function trasformazione() {
            document.getElementById('intro').classList.add('hide');
            init3D();
            
            // Avvia la transizione "Scheda Madre" dopo 2 secondi
            setTimeout(() => {
                let val = 1;
                const interval = setInterval(() => {
                    val -= 0.05;
                    armSolid.material.opacity = val;
                    armWire.material.opacity = 1 - val;
                    if(val <= 0) {
                        clearInterval(interval);
                        document.getElementById('ed-fisica').style.opacity = "1";
                    }
                }, 50);
            }, 2000);
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            armGroup = new THREE.Group();

            // 1. LA PROTESI (Modello Solido)
            const geometry = new THREE.CylinderGeometry(0.5, 0.3, 4, 32);
            const materialSolid = new THREE.MeshPhongMaterial({ 
                color: 0xcccccc, 
                transparent: true, 
                opacity: 1,
                shininess: 100 
            });
            armSolid = new THREE.Mesh(geometry, materialSolid);
            
            // 2. LA SCHEDA MADRE (Modello Wireframe/Circuiti)
            const materialWire = new THREE.MeshBasicMaterial({ 
                color: 0x38bdf8, 
                wireframe: true, 
                transparent: true, 
                opacity: 0 
            });
            armWire = new THREE.Mesh(geometry, materialWire);

            armGroup.add(armSolid);
            armGroup.add(armWire);
            scene.add(armGroup);

            // Luci e Posizione
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
            
            camera.position.z = 6;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            armGroup.rotation.y += 0.01;
            armGroup.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
