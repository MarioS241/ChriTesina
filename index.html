<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesina sulla Robotica - Christian Caruso</title>
    <style>
        /* Sfondo scuro e font moderno */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a; /* Blu scuro notte */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
        }

        /* Box centrale */
        .container {
            border: 2px solid #38bdf8; /* Azzurro robotica */
            padding: 50px;
            border-radius: 30px;
            background: rgba(30, 41, 59, 0.5);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 40px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }

        /* Bottone interattivo */
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background-color: #7dd3fc;
            transform: scale(1.15);
            box-shadow: 0 0 25px #38bdf8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Christian Caruso Production presenta...</h2>
        <h1>LA ROBOTICA</h1>
        <button onclick="avvia()">PRESENTA</button>
    </div>

    <script>
        function avvia() {
            // Qui puoi cambiare 'indice.html' con il nome della pagina successiva
            alert("Inizio presentazione della tesina!");
            // window.location.href = "pagina_successiva.html"; 
        }
    </script>

</body>
</html>
