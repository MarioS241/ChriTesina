<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotica - Christian Caruso</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* Overlay iniziale */
        #intro {
            position: fixed; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            background: radial-gradient(circle, #1e293b 0%, #000 100%);
        }

        .hide { opacity: 0; transform: scale(2) rotate(5deg); pointer-events: none; }

        h2 { color: #38bdf8; letter-spacing: 5px; font-size: 1rem; opacity: 0.8; }
        h1 { color: #fff; font-size: 4rem; text-transform: uppercase; letter-spacing: 12px; margin: 20px 0; text-shadow: 0 0 30px #38bdf8; }
        
        #btn-presenta {
            background: transparent; border: 2px solid #38bdf8; color: #38bdf8;
            padding: 20px 60px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        #btn-presenta:hover { background: #38bdf8; color: #000; box-shadow: 0 0 50px #38bdf8; }

        /* Scrittura Finale */
        #ed-fisica {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 6rem; font-weight: 900; opacity: 0;
            z-index: 50; pointer-events: none; text-shadow: 0 0 20px #38bdf8;
            transition: opacity 2s ease; letter-spacing: 15px;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div id="intro">
        <h2>CHRISTIAN CARUSO PRODUCTION PRESENTA</h2>
        <h1>LA ROBOTICA</h1>
        <button id="btn-presenta" onclick="triggerAnimation()">PRESENTA</button>
    </div>

    <div id="ed-fisica">ED. FISICA</div>
    <div id="canvas-container"></div>

    <!-- Audio incorporati (Suoni futuristici e meccanici) -->
    <audio id="sound-whoosh" src="https://mixkit.co"></audio>
    <audio id="sound-transform" src="https://mixkit.co"></audio>

    <script>
        let scene, camera, renderer, arm, particles;

        function triggerAnimation() {
            // 1. Audio
            document.getElementById('sound-whoosh').play();
            setTimeout(() => { document.getElementById('sound-transform').play(); }, 500);

            // 2. Sparisce la intro
            document.getElementById('intro').classList.add('hide');

            // 3. Appare il testo finale con ritardo
            setTimeout(() => {
                document.getElementById('ed-fisica').style.opacity = "1";
            }, 3500);

            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Creazione Braccio (Cilindro con Texture a Circuito)
            const geometry = new THREE.CylinderGeometry(0.8, 0.5, 4, 32);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x38bdf8, 
                wireframe: true, 
                emissive: 0x112244 
            });
            arm = new THREE.Mesh(geometry, material);
            scene.add(arm);

            // Particelle (Effetto atmosfera futuristica)
            const partGeom = new THREE.BufferGeometry();
            const partCount = 1000;
            const posArray = new Float32Array(partCount * 3);
            for(let i=0; i<partCount*3; i++) { posArray[i] = (Math.random() - 0.5) * 10; }
            partGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const partMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
            particles = new THREE.Points(partGeom, partMat);
            scene.add(particles);

            // Luci
            const light = new THREE.PointLight(0x38bdf8, 2, 50);
            light.position.set(2, 2, 5);
            scene.add(light);

            camera.position.z = 10; // Parte da lontano
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Animazione braccio: rotazione e zoom-in verso la "scheda madre"
            arm.rotation.y += 0.01;
            if(camera.position.z > 2.5) camera.position.z -= 0.05; // Zoom cinematografico
            
            particles.rotation.y += 0.001;
            
            renderer.render(scene, camera);
        }

        // Adatta al ridimensionamento finestra
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
